<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数列双重分类挑战 | 项数 + 变化趋势</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #fef0dd, #ffe2c1);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive;
            padding: 20px;
            min-height: 100vh;
        }
        .game-box {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 251, 235, 0.96);
            border-radius: 80px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            padding: 25px 30px;
            border: 3px solid #ffdeae;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #ff6f3c;
            text-shadow: 3px 3px 0 #ffcd94;
        }
        .sub {
            text-align: center;
            background: #fff0db;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding: 5px 28px;
            border-radius: 60px;
            font-weight: bold;
        }
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #fff3e2;
            border-radius: 70px;
            padding: 12px 25px;
            margin-bottom: 25px;
        }
        .score-area {
            background: #ffcf7a;
            border-radius: 50px;
            padding: 8px 25px;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .progress {
            background: #f2cf9b;
            border-radius: 40px;
            padding: 6px 20px;
            font-weight: bold;
        }
        .reset-btn {
            background: #ffaa44;
            border: none;
            padding: 8px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #a55d1c;
        }
        /* 中央题目卡片 */
        .question-card {
            background: #fffaf0;
            border-radius: 70px;
            padding: 30px;
            margin: 15px 0;
            box-shadow: 0 15px 0 #e2bc7c;
            text-align: center;
        }
        .seq-bubble {
            background: radial-gradient(circle at 30% 30%, #ffecb3, #ffcf7a);
            display: inline-block;
            padding: 20px 35px;
            border-radius: 100px;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 8px 0 #b87a3a;
        }
        .choice-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
        }
        .choice-box {
            background: #fff8ec;
            border-radius: 60px;
            padding: 15px 20px;
            min-width: 200px;
            box-shadow: inset 0 0 0 2px #ffe1b0;
        }
        .choice-title {
            font-weight: bold;
            font-size: 1.3rem;
            background: #ffda88;
            border-radius: 40px;
            padding: 6px;
            margin-bottom: 12px;
        }
        .option-btn {
            background: #ffe0a3;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            margin: 6px;
            cursor: pointer;
            transition: 0.05s linear;
            font-family: inherit;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        .option-btn.selected {
            background: #ffaa44;
            box-shadow: 0 0 0 2px #fff0b5, 0 3px 0 #9b5e1a;
            transform: scale(0.98);
        }
        .action-btn {
            background: #48b5b0;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            margin-top: 10px;
            box-shadow: 0 5px 0 #2a716d;
        }
        .feedback {
            background: #fff0d6;
            border-radius: 50px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b26;
            color: #ffeaac;
            padding: 12px 28px;
            border-radius: 70px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 200;
            animation: pop 0.25s ease;
            white-space: nowrap;
            border: 2px solid gold;
        }
        @keyframes pop {
            from { opacity: 0; transform: translateX(-50%) scale(0.8);}
            to { opacity: 1; transform: translateX(-50%) scale(1);}
        }
        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #b45a1c;
        }
    </style>
</head>
<body>
<div style="background:#4285F4; padding:15px; border-radius:8px; margin-bottom:20px;">
  <a href="index.html" style="color:white; margin:0 10px; text-decoration:none; font-weight:bold;">数列顺序探究（首页）</a>
  <a href="list.html" style="color:white; margin:0 10px; text-decoration:none; font-weight:bold;">数列分类挑战</a>
  <a href="link.html" style="color:white; margin:0 10px; text-decoration:none; font-weight:bold;">数列知识连连看</a>
  <a href="formula.html" style="color:white; margin:0 10px; text-decoration:none; font-weight:bold;">通项公式魔法工厂</a>
  <a href="tui.html" style="color:white; margin:0 10px; text-decoration:none; font-weight:bold;">递推公式实验室</a>
</div>
<div class="game-box">
    <h1>🧩 数列双重分类挑战</h1>
    <div style="text-align: center;"><span class="sub">📌 每个数列有两个维度：项数 & 变化趋势</span></div>

    <div class="dashboard">
        <div class="score-area">🏆 得分 <span id="scoreValue">0</span> / <span id="totalCount">0</span></div>
        <div class="progress">📋 进度 <span id="currentIdx">1</span> / <span id="totalQ">0</span></div>
        <button id="resetGameBtn" class="reset-btn">🔄 重新开始</button>
    </div>

    <div class="question-card">
        <div class="seq-bubble" id="sequenceDisplay">加载中...</div>
        <div class="choice-group">
            <div class="choice-box">
                <div class="choice-title">📦 项数分类</div>
                <div id="termOptions"></div>
            </div>
            <div class="choice-box">
                <div class="choice-title">📈 变化趋势分类</div>
                <div id="trendOptions"></div>
            </div>
        </div>
        <button id="submitBtn" class="action-btn">✨ 提交分类 ✨</button>
        <div id="feedbackMsg" class="feedback">✨ 为每个数列选择正确的项数类别和趋势类别 ✨</div>
    </div>
    <footer>💡 提示：一个数列可以同时是有穷/无穷和递增/递减/常/摆动，需要分别判断两个维度！</footer>
</div>

<script>
    // ---------- 题库（包含两个维度的正确分类）----------
    const QUESTION_SET = [
        { text: "75, 86, 110, 116, 128, 135, 153, 162, 165, 168", termType: "有穷数列", trendType: "递增数列", hint: "直播间单位时间累计人数，共10项，逐项增加" },
        { text: "1, 2, 4, 8, 16, ...", termType: "无穷数列", trendType: "递增数列", hint: "大鼠每日打洞长度，无限延伸，逐渐增大" },
        { text: "5, 10, 40, 80, 112, 144, 150, 176, 180, 208, 220, 240", termType: "有穷数列", trendType: "递增数列", hint: "12个月销量，项数有限，总体上升" },
        { text: "20, 18, 16, 14, 12, ...", termType: "无穷数列", trendType: "递减数列", hint: "无限递减" },
        { text: "5, 5, 5, 5, 5", termType: "有穷数列", trendType: "常数列", hint: "5项常数列" },
        { text: "1, -1, 1, -1, 1, ...", termType: "无穷数列", trendType: "摆动数列", hint: "正负交替" },
        { text: "2, 4, 6, 8, 10", termType: "有穷数列", trendType: "递增数列", hint: "前5个偶数" },
        { text: "100, 90, 80, 70", termType: "有穷数列", trendType: "递减数列", hint: "4项递减" },
        { text: "0, 0, 0, 0, 0, ...", termType: "无穷数列", trendType: "常数列", hint: "无限常数列" },
        { text: "3, -3, 3, -3, 3", termType: "有穷数列", trendType: "摆动数列", hint: "5项摆动" },
        { text: "1, 3, 5, 7, 9, ...", termType: "无穷数列", trendType: "递增数列", hint: "奇数无穷递增" },
        { text: "10, 10, 10, 10", termType: "有穷数列", trendType: "常数列", hint: "4项常数列" }
    ];

    let currentIndex = 0;
    let score = 0;
    let selectedTerm = null;      // 当前题目选择的项数分类
    let selectedTrend = null;     // 当前题目选择的趋势分类
    let answered = false;         // 是否已作答本题（防止重复提交）

    // DOM 元素
    const sequenceDisplay = document.getElementById('sequenceDisplay');
    const termOptionsDiv = document.getElementById('termOptions');
    const trendOptionsDiv = document.getElementById('trendOptions');
    const submitBtn = document.getElementById('submitBtn');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const scoreSpan = document.getElementById('scoreValue');
    const totalCountSpan = document.getElementById('totalCount');
    const currentIdxSpan = document.getElementById('currentIdx');
    const totalQSpan = document.getElementById('totalQ');
    const resetBtn = document.getElementById('resetGameBtn');

    const TERM_CATEGORIES = ["有穷数列", "无穷数列"];
    const TREND_CATEGORIES = ["递增数列", "递减数列", "常数列", "摆动数列"];

    function updateScoreAndProgress() {
        scoreSpan.innerText = score;
        totalCountSpan.innerText = QUESTION_SET.length;
        currentIdxSpan.innerText = currentIndex + 1;
        totalQSpan.innerText = QUESTION_SET.length;
    }

    // 渲染当前题目的选项
    function renderCurrentQuestion() {
        if (currentIndex >= QUESTION_SET.length) {
            // 通关
            sequenceDisplay.innerText = "🎉 恭喜通关！ 🎉";
            termOptionsDiv.innerHTML = "";
            trendOptionsDiv.innerHTML = "";
            submitBtn.disabled = true;
            feedbackDiv.innerHTML = "🎉 你已经掌握了数列的双重分类！刷新页面可重新挑战 🎉";
            return;
        }
        const q = QUESTION_SET[currentIndex];
        sequenceDisplay.innerText = q.text;
        // 重置选择
        selectedTerm = null;
        selectedTrend = null;
        answered = false;
        // 渲染项数选项
        termOptionsDiv.innerHTML = '';
        TERM_CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = 'option-btn';
            btn.onclick = () => {
                if (answered) {
                    feedbackDiv.innerHTML = "⚠️ 本题已完成，请点击下一题或重置游戏 ⚠️";
                    return;
                }
                // 清除同组高亮
                document.querySelectorAll('#termOptions .option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTerm = cat;
            };
            termOptionsDiv.appendChild(btn);
        });
        // 渲染趋势选项
        trendOptionsDiv.innerHTML = '';
        TREND_CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = 'option-btn';
            btn.onclick = () => {
                if (answered) {
                    feedbackDiv.innerHTML = "⚠️ 本题已完成，请点击下一题或重置游戏 ⚠️";
                    return;
                }
                document.querySelectorAll('#trendOptions .option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTrend = cat;
            };
            trendOptionsDiv.appendChild(btn);
        });
        feedbackDiv.innerHTML = "🔍 请选择正确的项数分类和变化趋势分类，然后提交。";
        feedbackDiv.style.background = "#fff0d6";
        submitBtn.disabled = false;
        updateScoreAndProgress();
    }

    // 提交答案
    function submitAnswer() {
        if (answered) {
            feedbackDiv.innerHTML = "⏳ 本题已经答过了，进入下一题吧！";
            return;
        }
        if (currentIndex >= QUESTION_SET.length) return;
        const q = QUESTION_SET[currentIndex];
        if (!selectedTerm || !selectedTrend) {
            feedbackDiv.innerHTML = "⚠️ 请先选择项数分类和变化趋势分类再提交！";
            return;
        }
        const termCorrect = (selectedTerm === q.termType);
        const trendCorrect = (selectedTrend === q.trendType);
        if (termCorrect && trendCorrect) {
            // 完全正确
            score++;
            updateScoreAndProgress();
            feedbackDiv.innerHTML = `✅ 完全正确！ “${q.text}” 属于 ${q.termType} 且 ${q.trendType}。 +1分 ✅<br>💡 ${q.hint}`;
            feedbackDiv.style.background = "#d9f0c5";
            answered = true;
            // 自动进入下一题
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < QUESTION_SET.length) {
                    renderCurrentQuestion();
                } else {
                    // 通关
                    renderCurrentQuestion();
                    feedbackDiv.innerHTML = "🏆 太棒了！你完成了所有数列的双重分类！ 🏆";
                    submitBtn.disabled = true;
                }
            }, 1200);
        } else {
            // 错误提示
            let msg = `❌ 分类错误！ `;
            if (!termCorrect && !trendCorrect) msg += `项数类别和趋势类别都不对。 `;
            else if (!termCorrect) msg += `项数类别不对（正确答案是 ${q.termType}），趋势类别正确。 `;
            else msg += `趋势类别不对（正确答案是 ${q.trendType}），项数类别正确。 `;
            msg += `再试试下一题吧！`;
            feedbackDiv.innerHTML = msg;
            feedbackDiv.style.background = "#ffdeda";
            answered = true;
            // 错误也进入下一题（教学性质）
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < QUESTION_SET.length) {
                    renderCurrentQuestion();
                } else {
                    renderCurrentQuestion();
                    submitBtn.disabled = true;
                }
            }, 1500);
        }
    }

    function resetGame() {
        currentIndex = 0;
        score = 0;
        answered = false;
        selectedTerm = null;
        selectedTrend = null;
        renderCurrentQuestion();
        updateScoreAndProgress();
        submitBtn.disabled = false;
        feedbackDiv.innerHTML = "✨ 游戏已重置，开始新的分类挑战吧！ ✨";
        feedbackDiv.style.background = "#fff0d6";
    }

    submitBtn.addEventListener('click', submitAnswer);
    resetBtn.addEventListener('click', resetGame);

    // 启动
    renderCurrentQuestion();
</script>
</body>
</html>
